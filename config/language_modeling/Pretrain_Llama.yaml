## data
train_file: /workingdir/yjin328/data/RAG/atlas_data/enwiki-dec2021/corpora/wiki/enwiki-dec2021/train.jsonl
dev_file: /workingdir/yjin328/data/RAG/atlas_data/enwiki-dec2021/corpora/wiki/enwiki-dec2021/dev.jsonl
max_seq_length: 256
retrieval_context_length: 180
num_workers: 16
overwrite_cache: false

index_start: 5000000
max_train_samples: 5000000
max_eval_samples: 1000

## model
chat_format: mistral
compressor_name_or_path: Salesforce/SFR-Embedding-Mistral

# model_name_or_path: meta-llama/Llama-3.1-8B-Instruct

# Use these if you want to load a model from a checkpoint
model_name_or_path: /nethome/yjin328/Workspace/RAG/SARA/checkpoints/pretrain/Llama3.1-8B-Instruct_5M/epoch_0
output_model_name: Llama3.1-8B-Instruct_10M

## train
workdir: .
num_train_epochs: 1
projector_learning_rate: 5.0e-4
model_learning_rate: 2.0e-5
update_projector_only: true
freeze_projector: false
use_lora: true

lr_scheduler_type: linear
warmup_ratio: 0.03
weight_decay: 0.0
use_flash_attn: true
alpha_nll: 1.0
alpha_kl: 0.0
clip_grad_norm: -1.0
seed: 42
per_device_train_batch_size: 16
per_device_eval_batch_size: 16
gradient_accumulation_steps: 16 ## assume there are 8 GPUs, so the total batch size is 384
task_type: pretrain
use_wandb: true
wandb_project: extremerag_pretraining
wandb_exp_name: pretrain_wikipedia_llama3
wandb_entity: yjin328
wandb_exp_note: "Pretraining Llama3.1-8B-Instruct on Wikipedia."


## logging
logging_steps: 20
checkpointing_steps: "epoch" ## string number or epoch
eval_steps: 1000000



## data
train_file: /workingdir/yjin328/data/RAG/atlas_data/enwiki-dec2021/corpora/wiki/enwiki-dec2021/train.jsonl
dev_file: /workingdir/yjin328/data/RAG/atlas_data/enwiki-dec2021/corpora/wiki/enwiki-dec2021/dev.jsonl
max_seq_length: 256
retrieval_context_length: 180
num_workers: 16
# max_train_samples: 100
index_start: 0
max_train_samples: 4000000

## model
chat_format: mistral
compressor_name_or_path: Salesforce/SFR-Embedding-Mistral
model_name_or_path: /workingdir/yjin328/SARA/checkpoints/pretrain/MistralSmall_1M/final # mistralai/Mistral-Small-Instruct-2409
output_model_name: MistralSmall_5M

## train
workdir: .
num_train_epochs: 1
projector_learning_rate: 5.0e-4
model_learning_rate: 2.0e-5
update_projector_only: true
freeze_projector: false
use_lora: false

lr_scheduler_type: cosine_with_restarts
warmup_ratio: 0.03
weight_decay: 0.0
num_train_epochs: 1
use_flash_attn: true
alpha_nll: 1.0
alpha_kl: 0.0
clip_grad_norm: -1.0
seed: 42
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 16 ## assume there are 8 GPUs, so the total batch size is 384
task_type: pretrain
use_wandb: true
use_lora: true



## logging
logging_steps: 10
wandb_project: pretraining
wandb_exp_name: pretrain_mistral_small
wandb_entity: yjin328
wandb_exp_note: "Pretraining mistralai/Mistral-Small-24B-Instruct-2501 on Wikipedia."

checkpointing_steps: "epoch" ## string number or epoch
eval_steps: 2000000



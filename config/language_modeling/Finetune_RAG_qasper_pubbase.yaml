## Matched Standard RAG training from the PUBLIC Mistral base (release plan §3).
## Standard RAG = top-n retrieved documents rendered entirely as text; no projector, no compression.
## Budgets (LM-LoRA LR, optimizer updates, effective global batch, seed, max seq len) MATCH the SARA run.

## data
train_file:
- data/reformatted/QASPER_train_split.jsonl   # SAME training papers as SARA (§3); dev excluded (§6)
dev_file: null
multiple_choice_train_file: null
max_seq_length: 2048
retrieval_context_length: 180
num_workers: 1
use_rag_tuning: true
max_train_samples: 2000

## model
chat_format: mistral
model_name_or_path: mistralai/Mistral-7B-Instruct-v0.2   # same public base as SARA
compressor_name_or_path: null                            # no compressor for text-only RAG
output_model_name: rag_qasper_lora_r16_seed42

## retrieval / evidence (RAG: all n rendered as text -> num_additional_evidence = 0)
num_evidence: 10
num_additional_evidence: 0
chunk_size: 256
compressor_encode_method: paragraph

## train
task_type: finetune
use_trainer: true
quantization: null
workdir: .
model_learning_rate: 2.0e-5          # LM-LoRA LR (MATCHED to SARA)
projector_learning_rate: 0.0         # no projector in RAG
use_lora: true
update_projector_only: false
freeze_projector: true
lr_scheduler_type: linear
warmup_ratio: 0.03
weight_decay: 0.0
num_train_epochs: 3
use_flash_attn: false
alpha_nll: 1.0
alpha_kl: 0.0
kl_temperature: 1.0
clip_grad_norm: 1.0
seed: 42
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
gradient_accumulation_steps: 1       # effective batch = 8 per device (matched RAG/SARA)
max_train_steps: 250   # IDENTICAL optimizer updates across RAG and SARA (release plan §3)
checkpointing_steps: epoch

## logging
logging_steps: 1
wandb_project: sara_qasper
wandb_exp_name: rag_qasper_lora_r16_seed42
wandb_exp_note: "Standard RAG public-base QASPER"
use_wandb: false

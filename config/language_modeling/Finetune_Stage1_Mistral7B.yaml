## data
train_file: 
- data/reformatted/SQuADv2_train.jsonl
# - data/reformatted/QASPER_train.jsonl
# - data/reformatted/HotpotQA_train.jsonl
# - data/reformatted/NarrativeQA_train.jsonl
# - data/reformatted/QuALITY_train.jsonl
# - data/reformatted/TriviaQA_train.jsonl

# - data/QASPER_test.jsonl
# - data/HotpotQA_validation.jsonl
# - data/NarrativeQA_validation.jsonl
# - data/QuALITY_validation.jsonl


dev_file: null
max_seq_length: 2048
retrieval_context_length: 180
num_workers: 16
use_rag_tuning: true
max_train_samples: 10000

## model
chat_format: mistral
compressor_name_or_path: Salesforce/SFR-Embedding-Mistral

# model_name_or_path: /workingdir/yjin328/SARA/checkpoints/paragraph/Mistral7B_20M_Paragraph_1M
model_name_or_path: /workingdir/yjin328/SARA/checkpoints/finetune/Mistral7B_QA_Compress_Stage0
# output_model_name: Mistral7B_QA
output_model_name: Mistral7B_QA_Compress_Stage1

## Retrieval
num_evidence: 1
num_additional_evidence: 1
chunk_size: 256

compressor_encode_method: paragraph


## train
task_type: finetune_stage1
quantization: null
workdir: .
model_learning_rate: 2.0e-5
projector_learning_rate: 0.0
use_lora: true
update_projector_only: false
freeze_projector: true
lr_scheduler_type: linear
warmup_ratio: 0.03
weight_decay: 0.0
num_train_epochs: 1
use_flash_attn: true
alpha_nll: 1.0
alpha_kl: 0.1 # 2.0
kl_temperature: 1.0 
clip_grad_norm: -1.0
seed: 42
per_device_train_batch_size: 16
per_device_eval_batch_size: 16
gradient_accumulation_steps: 16   ## assume there are 8 GPUs
max_train_steps: null # Set to null for actual training
checkpointing_steps: 500
use_trainer: true

## logging
logging_steps: 1
workdir: .
wandb_project: extremerag_finetune
wandb_exp_name: extremerag_finetune_Mistral7B
wandb_exp_note: "Finetune Mistral7B"
use_wandb: true

# checkpointing_steps: "1000" ## string number or epoch


